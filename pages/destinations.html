<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destinations | Solenne Escapes</title>
    <meta name="description" content="Future-ready destinations section with region descriptions and linked homes." />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section class="hero-mini">
        <span class="badge">Destinations</span>
        <h1>Future-ready destinations structure</h1>
        <p>This section is set up for expansion by country, island, and city with linked property listings.</p>
      </section>

      <section>
        <div class="container">
          <div id="destinations-grid" class="grid grid-3"></div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <div class="cookie-banner" id="cookie-banner">
      <p>We use cookies to improve browsing, analyze traffic, and personalize content.</p>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="button button-outline" id="cookie-reject" type="button">Decline</button>
        <button class="button button-primary" id="cookie-accept" type="button">Accept</button>
      </div>
    </div>

    <script src="../assets/data/site-data.js"></script>
    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/destinations.js"></script>
  </body>
</html>
